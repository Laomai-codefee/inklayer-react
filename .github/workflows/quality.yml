name: Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - run: npm run lint

      - run: npm run test:ci

      - run: npm run build

      - run: npm run check:package

      - run: npm pack --dry-run
        env:
          npm_config_ignore_scripts: true
